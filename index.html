let _authToken = localStorage.getItem('gc_token') || null;

async function apiCall(method, path, body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ..._authToken ? { Authorization: 'Bearer ' + _authToken } : {} }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API_URL + path, opts);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Ошибка сервера');
    return data;
  } catch(e) {
    // Fallback to localStorage mode if server unavailable
    console.warn('Backend unavailable, using localStorage:', e.message);
    return null;
  }
}

function open1CEdit(tradeName){
  tradeName=tradeName.trim();
  window._1cTN=tradeName; // safe reference without escaping issues
  const ing=S.stock.find(x=>x.tradeName.trim()===tradeName)||S.meta.find(x=>x.tradeName.trim()===tradeName)||{tradeName};
  const m=S.meta.find(x=>x.tradeName.toLowerCase()===tradeName.toLowerCase())||{};
  const merged={...ing,...m,barcode:ing.barcode||m.barcode||''};
  // Cascade state
  window._1cEdit={tradeName,merged};
  window._1cRoom=merged.spotId?getRoomOfSpot(merged.spotId):'';
  window._1cRack=merged.spotId?getRackOfSpot(merged.spotId):'';
  window._1cShelf=merged.spotId?getShelfOfSpot(merged.spotId):'';
  window._1cSpot=merged.spotId||'';
  render1CEditModal(tradeName);
}
function getRoomOfSpot(sid){
  const sp=S.spots.find(s=>s.id===sid);if(sp){const sh=S.shelves.find(s=>s.id===sp.shelfId);if(sh){const ra=S.racks.find(r=>r.id===sh.rackId);if(ra)return ra.roomId;}}
  const sh=S.shelves.find(s=>s.id===sid);if(sh){const ra=S.racks.find(r=>r.id===sh.rackId);if(ra)return ra.roomId;}
  const ra=S.racks.find(r=>r.id===sid);if(ra)return ra.roomId;
  const ro=S.rooms.find(r=>r.id===sid);if(ro)return ro.id;
  return'';
}
function getRackOfSpot(sid){
  const sp=S.spots.find(s=>s.id===sid);if(sp){const sh=S.shelves.find(s=>s.id===sp.shelfId);if(sh)return sh.rackId;}
  const sh=S.shelves.find(s=>s.id===sid);if(sh)return sh.rackId;
  const ra=S.racks.find(r=>r.id===sid);if(ra)return ra.id;
  return'';
}
function getShelfOfSpot(sid){
  const sp=S.spots.find(s=>s.id===sid);if(sp)return sp.shelfId;
  const sh=S.shelves.find(s=>s.id===sid);if(sh)return sh.id;
  return'';
}

function save1CEdit(tradeName){
  const inci=(document.getElementById('e1c-inci')||{}).value?.trim()||'';
  const expiry=(document.getElementById('e1c-exp')||{}).value||'';
  const qty=parseFloat((document.getElementById('e1c-qty')||{}).value)||0;
  // barcode: если поле пустое — сохраняем существующий из stock/meta
  const bcInput=(document.getElementById('e1c-bc')||{}).value?.trim()||'';
  const existingBC=(S.stock.find(x=>x.tradeName===tradeName)||S.meta.find(x=>x.tradeName===tradeName)||{}).barcode||'';
  const bc=bcInput||existingBC;
  const type=window._1cEdit?.merged?.type||'';
  const pkg=window._1cEdit?.merged?.pkg||'';

  // Resolve or CREATE location entities — читаем актуальное состояние из DOM
  let roomId=(document.getElementById('1c-room-sel')||{}).value||window._1cRoom||'';
  let rackId=(document.getElementById('1c-rack-sel')||{}).value||window._1cRack||'';
  let shelfId=(document.getElementById('1c-shelf-sel')||{}).value||window._1cShelf||'';
  let spotId=(document.getElementById('1c-spot-sel')||{}).value||window._1cSpot||'';

  if(roomId==='__new'){
    const n=(document.getElementById('1c-room-new')||{}).value?.trim();
    if(n){roomId='room_'+uid();S.rooms.push({id:roomId,name:n,color:PAL[0]});sv();}else roomId='';
  }
  if(rackId==='__new'&&roomId){
    const n=(document.getElementById('1c-rack-new')||{}).value?.trim();
    if(n){rackId='rack_'+uid();S.racks.push({id:rackId,roomId,name:n,color:PAL[1]});sv();}else rackId='';
  }
  if(shelfId==='__new'&&rackId){
    const n=(document.getElementById('1c-shelf-new')||{}).value?.trim();
    if(n){shelfId='shelf_'+uid();S.shelves.push({id:shelfId,rackId,name:n,color:PAL[5]});sv();}else shelfId='';
  }
  if(spotId==='__new'&&shelfId){
    const n=(document.getElementById('1c-spot-new')||{}).value?.trim();
    if(n){spotId='spot_'+uid();S.spots.push({id:spotId,shelfId,name:n,type,color:PAL[6]});sv();}else spotId='';
  }

  // Use deepest defined level
  const finalSpotId=spotId||shelfId||rackId||roomId||'';

  // Remove bc from old owner
  if(bc){const prev=S.meta.find(x=>x.barcode===bc&&x.tradeName!==tradeName);if(prev)svm(prev.tradeName,{barcode:''});}
  svm(tradeName,{inci,expiry,qty,type,pkg,barcode:bc,spotId:finalSpotId});

  // Update stock entry too
  const idx=S.stock.findIndex(x=>x.tradeName===tradeName);
  if(idx>=0)S.stock[idx]={...S.stock[idx],inci,expiry,qty,barcode:bc,spotId:finalSpotId};
  cM();sT('stock');
}

// 1C barcode scanner
let _1cStr=null,_1cTmr=null;
function open1CBCScanner(){
  const wrap=document.getElementById('e1c-cam-wrap');if(!wrap)return;
  if(_1cStr){stop1CBCScanner();return;}
  const v=document.getElementById('lv');if(!v)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}}).then(stream=>{
    _1cStr=stream;v.srcObject=stream;v.play();
    wrap.appendChild(v);wrap.style.display='block';
    v.style.cssText='width:100%;height:180px;object-fit:cover;display:block;';
    const st=document.getElementById('e1c-bc-st');if(st){st.textContent='Наведите на штрих-код...';st.style.color='#1E6BE6';}
    let cv1c=document.getElementById('sc1c');if(!cv1c){cv1c=document.createElement('canvas');cv1c.id='sc1c';cv1c.style.display='none';document.body.appendChild(cv1c);}
    _1cTmr=setInterval(()=>{
      if(v.readyState<2)return;
      function tryD(scale){cv1c.width=Math.round(v.videoWidth*scale);cv1c.height=Math.round(v.videoHeight*scale);cv1c.getContext('2d').drawImage(v,0,0,cv1c.width,cv1c.height);const id=cv1c.getContext('2d').getImageData(0,0,cv1c.width,cv1c.height);if(window.jsQR){const r=window.jsQR(id.data,id.width,id.height,{inversionAttempts:'attemptBoth'});if(r)return r.data;}if(window.ZXing){try{const hints=new Map();hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.UPC_E]);hints.set(ZXing.DecodeHintType.TRY_HARDER,true);const rd=new ZXing.MultiFormatReader();rd.setHints(hints);const ls=new ZXing.HTMLCanvasElementLuminanceSource(cv1c);const res=rd.decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(ls)));if(res)return res.getText();}catch(e){}}return null;}
      const bc=tryD(1)||tryD(0.5)||tryD(2);
      if(bc){stop1CBCScanner();const el=document.getElementById('e1c-bc');if(el){el.value=bc;el.style.borderColor='#38A169';}const st=document.getElementById('e1c-bc-st');if(st){st.textContent='Считан: '+bc;st.style.color='#38A169';st.style.fontWeight='700';}}
    },300);
  }).catch(e=>{const st=document.getElementById('e1c-bc-st');if(st){st.textContent='Камера недоступна';st.style.color='#E53E3E';}});
}
function stop1CBCScanner(){
  clearInterval(_1cTmr);_1cTmr=null;
  if(_1cStr){_1cStr.getTracks().forEach(t=>t.stop());_1cStr=null;}
  const v=document.getElementById('lv');if(v){v.style.display='none';v.srcObject=null;document.body.appendChild(v);}
  const wrap=document.getElementById('e1c-cam-wrap');if(wrap)wrap.style.display='none';
}

function pTRA(rows,headerRow){
  const hdr=rows[headerRow].map(v=>String(v||'').toLowerCase().trim());
  const tradeCol=hdr.findIndex(v=>v.includes('торговое'));
  let phaseCol=hdr.findIndex(v=>v==='фаза'||v==='phase');
  if(phaseCol<0)phaseCol=Math.max(0,tradeCol-1);
  const inciCol=tradeCol+1;
  const supplierCol=hdr.findIndex(v=>v.includes('поставщ')||v.includes('supplier'));
  let pctCol=-1;
  for(let j=inciCol+1;j<hdr.length;j++){
    if(hdr[j].includes('доля')||hdr[j].includes('масс')||hdr[j]==='%'||hdr[j].includes('массовая')){pctCol=j;break;}
  }
  if(pctCol<0){
    for(let j=inciCol+1;j<Math.min(hdr.length+1,10);j++){
      const vals=rows.slice(headerRow+1,headerRow+6).map(r=>parseFloat(String(r[j]||'').replace(',','.'))).filter(v=>!isNaN(v)&&v>0&&v<=100);
      if(vals.length>=2){pctCol=j;break;}
    }
  }
  if(pctCol<0)pctCol=inciCol+1;

  for(let i=headerRow+1;i<rows.length;i++){

    const phaseVal=String(row[phaseCol]||'').trim();
    const trade=String(row[tradeCol]||'').trim().replace(/\xa0/g,' ').trim();
    const inci=String(row[inciCol]||'').trim().replace(/\xa0/g,' ').trim();
    const pctRaw=String(row[pctCol]||'').trim();
    const supplier=supplierCol>=0?String(row[supplierCol]||'').trim():'';
    if(/^[А-ЯA-Zа-яa-z]$/.test(phaseVal)||/^фаза\s+\S$/i.test(phaseVal))ph=(phaseVal.match(/[А-ЯA-Z]/i)||[phaseVal])[0].toUpperCase();
    if(!trade||trade.toLowerCase().includes('торговое')||trade.toLowerCase()==='name')continue;
    if(pctRaw.startsWith('='))continue;
    const pct=parseFloat(pctRaw.replace(',','.'));
    if(isNaN(pct)||pct<=0)continue;
    items.push({phase:ph||'А',trade,inci,pct,supplier});
    lastDataRow=i;
  }
  // Парсим инструкции и техтребования после таблицы — поддержка всех форматов
  const instructions=[];const specs=[];
  if(lastDataRow>0){
    let inSpecs=false;
    for(let i=lastDataRow+1;i<Math.min(lastDataRow+100,rows.length);i++){
      const row=rows[i];
      const c0=String(row[0]||'').trim(),c1=String(row[1]||'').trim(),c2=String(row[2]||'').trim(),c3=String(row[3]||'').trim();
      let num='',txt='';
      // Формат А: col1=число, col2=текст (Мусс, Синий крем, Ночной крем)
      if(/^\d+\.?\d*$/.test(c1)&&c2.length>10&&!c2.toLowerCase().startsWith('состав')){num=c1;txt=c2;}
      // Формат Б: col0=«1.Фаза А:...» или «1. В реактор...»
      else if(/^\d+[\.\)]\s*.{5,}/.test(c0)){num=c0.match(/^(\d+[\.\)])/)?.[1]||'';txt=c0.replace(/^\d+[\.\)]\s*/,'').trim();}
      // Формат Г: col0=число, col1=длинный текст (Каламин, Лифтинговая маска)
      else if(/^\d+\.?\d*$/.test(c0)&&c1.length>10&&!c1.toLowerCase().startsWith('состав')){num=c0;txt=c1;}
      if(txt.length>10)instructions.push({num:num||String(instructions.length+1),txt});
      // Тех требования: определяем блок по заголовку
      if((c0+c1+c2).toLowerCase().includes('технич')||(c1+c2).toLowerCase().includes('наименование показателя'))inSpecs=true;
      if(inSpecs&&c1.length>3&&(c2.length>0||c3.length>0)){
        const param=c1,val=c2||c3;
        if(val&&!param.toLowerCase().includes('наименование')&&!param.toLowerCase().includes('гост')&&!/^\d+$/.test(val)&&param.length>2)
          specs.push({param,val});
      }
    }
  }
  return {items,instructions,specs};
}
function pSS(rows){const products=[];let cN='',cI=[],inT=false;for(const row of rows){const c1=String(row[1]||'').trim(),c2=String(row[2]||'').trim(),c3=String(row[3]||'').trim();if(c1==='Торговое наименование'||c1==='Наименование'){inT=true;continue;}const pct=parseFloat(c3.replace(',','.'));if(inT&&c1&&!isNaN(pct)&&pct>0){cI.push({phase:'А',trade:c1,inci:c2,pct});continue;}if(inT&&(!c1||(!isNaN(parseFloat(c1))&&cI.length>0))){if(cN&&cI.length)products.push({name:cN,items:cI});cN='';cI=[];inT=false;continue;}if(!inT&&c1&&isNaN(parseFloat(c3))){if(cN&&cI.length)products.push({name:cN,items:cI});cN=c1;cI=[];inT=false;}}if(cN&&cI.length)products.push({name:cN,items:cI});return products;}

function parseExcel1C(rows){
  // ── Формат «Запас» (наш формат выгрузки из 1С) ──
  // Строка N:   Название | Остаток
  // Строка N+1: Штрихкод | (пусто или повтор остатка)
  // Заголовок: строка 1 = ['Номенклатура','Остаток'] / ['Номенклатура.Штрихкод','']
  const h0=String(rows[0]?.[0]||'').trim().toLowerCase();
  const h1=String(rows[1]?.[0]||'').trim().toLowerCase();
  const isZapas=(h0==='номенклатура'&&h1==='номенклатура.штрихкод')||
    (function(){let hits=0;for(let i=1;i<Math.min(30,rows.length);i++){const v=String(rows[i][0]||'').trim();const p=String(rows[i-1][0]||'').trim();if(/^\d{8,15}$/.test(v)&&p.length>2&&!/^\d+$/.test(p))hits++;if(hits>=2)return true;}return false;})();

  const skipKw=['итого','total','группа','group','раздел','прайс','масла','консерванты','эмульгаторы','загустители','пав','отдушки','красители'];
  const items=[];

  if(isZapas){
    // Пропускаем две строки заголовка (Номенклатура + Номенклатура.Штрихкод)
    let i=0;
    if(h0==='номенклатура')i=2; // пропускаем оба заголовка
    for(;i<rows.length;i+=2){
      const nameRow=rows[i];
      const bcRow=rows[i+1]||[];
      const name=String(nameRow[0]||'').trim();
      if(!name||name.length<2)continue;
      if(skipKw.some(k=>name.toLowerCase()===k))continue;
      // qty из col B строки с именем
      const qty=parseFloat(String(nameRow[1]||'').replace(',','.'))||0;
      // barcode из col A следующей строки
      const bcVal=String(bcRow[0]||'').trim();
      const barcode=/^\d{6,15}$/.test(bcVal)?bcVal:'';
      items.push({id:'i'+i,tradeName:name,qty,inci:'',expiry:'',barcode,spotId:''});
    }
  } else {
    // ── Универсальный режим (другие форматы) ──
    const nameKw=['номенклатура','наименование','название','товар','материал','name'];
    const qtyKw=['остаток','количество','qty','кол','факт','конечный','запас'];
    const inciKw=['inci','cas','характеристика'];
    const expiryKw=['срок','expiry','дата'];
    const bcKw=['штрихкод','штрих-код','barcode','ean'];
    let headerRow=-1,nameCol=-1,qtyCol=-1,inciCol=-1,expiryCol=-1,bcCol=-1;
    for(let i=0;i<Math.min(20,rows.length);i++){
      const row=rows[i].map(v=>String(v||'').toLowerCase().trim());
      const ni=row.findIndex(v=>nameKw.some(k=>v.includes(k)));
      if(ni>=0){headerRow=i;nameCol=ni;qtyCol=row.findIndex(v=>qtyKw.some(k=>v.includes(k)));inciCol=row.findIndex(v=>inciKw.some(k=>v.includes(k)));expiryCol=row.findIndex(v=>expiryKw.some(k=>v.includes(k)));bcCol=row.findIndex(v=>bcKw.some(k=>v.includes(k)));break;}
    }
    if(headerRow>=0){
      for(let i=headerRow+1;i<rows.length;i++){
        const row=rows[i];
        let rawName=String(row[nameCol]||'').trim().replace(/^[\s.]+/,'');
        if(!rawName||rawName.length<2)continue;
        if(skipKw.some(k=>rawName.toLowerCase().includes(k)&&rawName.length<50))continue;
        const qty=qtyCol>=0?parseFloat(String(row[qtyCol]||'').replace(',','.'))||0:0;
        const inci=inciCol>=0?String(row[inciCol]||'').trim():'';
        const expiry=expiryCol>=0?String(row[expiryCol]||'').trim():'';
        const barcode=bcCol>=0?String(row[bcCol]||'').trim().replace(/\D/g,''):'';
        const hasChildren=rows.slice(i+1,i+3).some(r=>String(r[nameCol]||'').match(/^\s{4,}/));
        if(!qty&&hasChildren)continue;
        items.push({id:'i'+i,tradeName:rawName,qty,inci,expiry:fmtExpiry(expiry),barcode,spotId:''});
      }
    } else {
      // без заголовка
      for(let i=0;i<rows.length;i++){
        const row=rows[i];
        let rawName=String(row[0]||'').trim().replace(/^[\s.]+/,'');
        if(!rawName||rawName.length<2)continue;
        if(skipKw.some(k=>rawName.toLowerCase().includes(k)&&rawName.length<50))continue;
        let qty=0;for(let j=1;j<Math.min(8,row.length);j++){const v=parseFloat(String(row[j]||'').replace(',','.'));if(!isNaN(v)&&v>=0){qty=v;break;}}
        items.push({id:'i'+i,tradeName:rawName,qty,inci:'',expiry:'',barcode:'',spotId:''});
      }
    }
  }
  const seen=new Set();
  return items.filter(x=>{if(seen.has(x.tradeName.toLowerCase()))return false;seen.add(x.tradeName.toLowerCase());return true;});
}

function fmtExpiry(v){
  if(!v||v==='0')return'';
  // Try parse date
  const d=new Date(v);
  if(!isNaN(d.getTime())&&d.getFullYear()>2000)return d.toISOString().slice(0,10);
  // Try DD.MM.YYYY
  const m=String(v).match(/(\d{1,2})[\.\-](\d{1,2})[\.\-](\d{2,4})/);
  if(m){const y=m[3].length===2?'20'+m[3]:m[3];return`\${y}-\${m[2].padStart(2,'0')}-\${m[1].padStart(2,'0')}`;}
  return'';
}

}

function hAS(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{dBC(ev.target.result,bc=>{const found=S.stock.find(x=>x.barcode===bc)||S.meta.find(x=>x.barcode===bc);if(found)dA(found.tradeName);else{S.scanDone={barcode:bc,notFound:true};S.am='manual';rM();}},()=>{S.scanDone={error:'Не распознан. Попробуйте ближе.'};rM();});};r.readAsDataURL(f);input.value='';}

// ── ИНВЕНТАРИЗАЦИЯ ────────────────────────────────────────────────
function rInv(){
  const inv=S.inv;

  const allIngs=[...S.meta,...S.stock.filter(s=>!S.meta.find(m=>m.tradeName.toLowerCase()===s.tradeName.toLowerCase()))].filter(x=>x.tradeName);

  const total=allIngs.length;

  if(!inv.active){
    return`<div class="card" style="padding:20px;text-align:center;margin-bottom:12px">

      <button onclick="startInv()" style="background:#1E6BE6;color:#fff;border:none;border-radius:8px;padding:13px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 4px 12px #1E6BE625">Начать инвентаризацию</button>
    </div>

  }

  // Active session
  const startTime=new Date(inv.startedAt);
  const diff=Math.round((Date.now()-startTime)/60000);
  const timeStr=diff<60?diff+'мин':`${Math.floor(diff/60)}ч ${diff%60}мин`;

  // Build items list - all meta items
  const rows=allIngs.map(ing=>{
    const fact=inv.items[ing.tradeName];
    const plan=parseFloat(ing.qty)||0;
    const counted2=fact!==undefined;
    const diff2=counted2?(parseFloat(fact)||0)-plan:null;
    const path=ing.spotId?gsp(ing.spotId):'';
    return{ing,fact,plan,counted:counted2,diff:diff2,path};
  });

  const notCounted=rows.filter(r=>!r.counted);
  const withDiff=rows.filter(r=>r.counted&&r.diff!==0&&r.diff!==null);
  const ok=rows.filter(r=>r.counted&&r.diff===0);

  return`
    <!-- Header -->
    <div style="background:#1E6BE6;border-radius:12px;padding:14px 16px;margin-bottom:12px;color:#fff">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:700;font-size:14px">Инвентаризация идёт...</div>
        <div style="font-size:11px;opacity:.8">${timeStr}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
        <div style="background:rgba(255,255,255,.15);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800">${counted}</div>
          <div style="font-size:10px;opacity:.8">проверено</div>
        </div>
        <div style="background:rgba(255,255,255,.15);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800">${notCounted.length}</div>
          <div style="font-size:10px;opacity:.8">осталось</div>
        </div>
        <div style="background:rgba(${withDiff.length>0?'239,68,68':'52,211,153'},.25);border-radius:8px;padding:8px">
          <div style="font-size:20px;font-weight:800">${withDiff.length}</div>
          <div style="font-size:10px;opacity:.8">расхождений</div>
        </div>
      </div>
    </div>

    <!-- Scan input -->
    <div class="card" style="padding:14px;margin-bottom:12px">
      <!-- Переключатель режима -->
      <div style="display:flex;gap:6px;margin-bottom:12px;background:#F0F4FA;border-radius:8px;padding:3px">
        <button id="inv-mode-bc" onclick="invSetMode('bc')" style="flex:1;padding:7px;border-radius:6px;border:none;background:#1E6BE6;color:#fff;font-size:12px;font-weight:700;cursor:pointer">📷 Штрих-код</button>
        <button id="inv-mode-name" onclick="invSetMode('name')" style="flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:#6B7A8D;font-size:12px;font-weight:600;cursor:pointer">🔤 По названию</button>

      <!-- Режим: штрих-код -->
      <div id="inv-panel-bc">
        <div style="display:flex;gap:8px;margin-bottom:8px">

          <button class="abtn" onclick="invScanManual()">Найти</button>
        </div>
        <button onclick="startInvCamera()" id="inv-cam-btn" style="width:100%;background:#F8FAFF;border:1.5px solid #E0E8F4;border-radius:8px;padding:9px;font-size:13px;color:#1E6BE6;font-weight:600;cursor:pointer">Включить камеру</button>
        <div id="inv-cam-wrap" style="margin-top:8px;border-radius:8px;overflow:hidden;display:none"></div>
      </div>

      <!-- Режим: по названию -->
      <div id="inv-panel-name" style="display:none">
        <div style="position:relative;overflow:visible">
          <input id="inv-name-inp" class="inp" placeholder="Начните вводить название..." style="font-size:14px" oninput="invNameSearch(this.value)" onkeydown="if(event.key==='Enter'){invNamePickFirst();event.preventDefault()}">
          <div id="inv-name-results" style="position:relative;left:0;right:0;margin-top:6px;background:#fff;border:1.5px solid #E0E8F4;border-radius:8px;z-index:200;max-height:320px;overflow-y:auto;display:none;box-shadow:0 4px 20px rgba(0,0,0,.12)"></div>
        </div>
        <div style="font-size:11px;color:#8896AA;margin-top:6px">Введите часть названия для поиска</div>
      </div>

      <div id="inv-scan-msg" style="font-size:12px;margin-top:8px;min-height:14px"></div>
    </div>

    <!-- Current scanned item -->
    <div id="inv-current"></div>

    <!-- Not counted -->
    ${notCounted.length>0?`<div class="card" style="margin-bottom:10px">
      <div style="padding:10px 14px;border-bottom:1px solid #E8ECF2;display:flex;justify-content:space-between">
        <span style="font-size:11px;font-weight:700;color:#8896AA;text-transform:uppercase;letter-spacing:.5px">Не проверено (${notCounted.length})</span>
      </div>
      ${notCounted.slice(0,10).map(r=>`<div onclick="invSelectItem('${h(r.ing.tradeName)}')" style="padding:10px 14px;border-bottom:1px solid #F0F4F8;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:13px;color:#0F1829">${h(r.ing.tradeName)}</div>
          ${r.path?`<div style="font-size:11px;color:#1E6BE6;margin-top:2px">📍 ${h(r.path)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px">
          <div style="font-size:11px;color:#8896AA">в системе</div>
          <div style="font-size:14px;font-weight:700;color:#6B7A8D">${r.plan}г</div>
        </div>
      </div>`).join('')}
      ${notCounted.length>10?`<div style="padding:8px 14px;font-size:11px;color:#8896AA;text-align:center">ещё ${notCounted.length-10} позиций...</div>`:''}
    </div>`:''}

    <!-- Discrepancies -->
    ${withDiff.length>0?`<div class="card" style="margin-bottom:10px">
      <div style="padding:10px 14px;border-bottom:1px solid #E8ECF2">
        <span style="font-size:11px;font-weight:700;color:#E53E3E;text-transform:uppercase;letter-spacing:.5px">Расхождения (${withDiff.length})</span>
      </div>
      ${withDiff.map(r=>`<div style="padding:10px 14px;border-bottom:1px solid #F0F4F8;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:13px;color:#0F1829">${h(r.ing.tradeName)}</div>
          ${r.path?`<div style="font-size:11px;color:#1E6BE6;margin-top:2px">📍 ${h(r.path)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px">
          <div style="font-size:10px;color:#8896AA">было → факт</div>
          <div style="font-size:13px;font-weight:700;color:${r.diff>0?'#38A169':'#E53E3E'}">${r.plan}г → ${parseFloat(r.fact)}г</div>
          <div style="font-size:11px;font-weight:700;color:${r.diff>0?'#38A169':'#E53E3E'}">${r.diff>0?'+':''}${r.diff}г</div>
        </div>
      </div>`).join('')}
    </div>`:''}

    <!-- OK items -->
    ${ok.length>0?`<div class="card" style="margin-bottom:10px">
      <div style="padding:10px 14px;border-bottom:1px solid #E8ECF2">
        <span style="font-size:11px;font-weight:700;color:#38A169;text-transform:uppercase;letter-spacing:.5px">Совпадает (${ok.length})</span>
      </div>
      ${ok.map(r=>`<div style="padding:8px 14px;border-bottom:1px solid #F0F4F8;display:flex;justify-content:space-between">
        <div style="font-size:13px;color:#6B7A8D">${h(r.ing.tradeName)}</div>
        <div style="font-size:13px;font-weight:600;color:#38A169">${parseFloat(r.fact)}г</div>
      </div>`).join('')}
    </div>`:''}

    <!-- Finish + Export buttons -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${counted>0?`<button onclick="finishInv()" style="width:100%;background:#1E6BE6;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px #1E6BE630">✓ Завершить и обновить остатки</button>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button onclick="exportInv('report')" style="background:#F0FFF4;border:1.5px solid #9AE6B4;color:#276749;border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;cursor:pointer">📊 Отчёт xlsx</button>
        <button onclick="exportInv('1c')" style="background:#EBF5FF;border:1.5px solid #C5D8FF;color:#1E5FA8;border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;cursor:pointer">📤 В 1С xlsx</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button onclick="exportInv('csv-report')" style="background:#FFF8F0;border:1.5px solid #FBD38D;color:#7B4F0E;border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;cursor:pointer">📋 Отчёт CSV</button>
        <button onclick="exportInv('csv-1c')" style="background:#FFF8F0;border:1.5px solid #FBD38D;color:#7B4F0E;border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;cursor:pointer">📋 1С CSV</button>
      </div>
      <button onclick="cancelInv()" style="width:100%;background:#fff;border:1.5px solid #E8ECF2;color:#8896AA;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer">Отменить инвентаризацию</button>
    </div>
  `;
}

function rBrew(){
  const br=S.brew;

  // ── Стартовый экран ──
  if(!br.active){
    const hist=S.brewHistory||[];
    return`
    <div class="card" style="padding:16px;margin-bottom:10px">
      <div class="slbl" style="margin-bottom:10px">Новая варка</div>
      <div class="fg" style="margin-bottom:8px">
        <label class="lbl">Название продукта</label>

      <label style="display:block;background:#F8FAFF;border:1.5px dashed #D0D8E8;border-radius:7px;padding:10px;text-align:center;cursor:pointer;font-size:12px;color:#8896AA;margin-bottom:7px">
        ${S.tech.length?`✓ Загружена из Сборки (${S.tech.length} позиций) — или загрузите новую`:'Загрузить Excel тех карты'}
        <input type="file" accept=".xlsx,.xls" style="display:none" onchange="brewLoadTech(this)">
      </label>
      ${S.tech.length&&!br.tech.length?`<button onclick="brewUsePick()" style="width:100%;background:#EBF5FF;border:1.5px solid #C5D8FF;color:#1E6BE6;border-radius:7px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px">Использовать тех карту из Сборки</button>`:''}
      ${br.tech.length?`<div style="font-size:11px;color:#38A169;margin-bottom:8px;font-weight:600">✓ ${br.tech.length} ингредиентов готовы</div>`:''}
      <button onclick="brewStart()" style="width:100%;background:${br.tech.length?'#1E6BE6':'#C0C8D8'};color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer" ${br.tech.length?'':'disabled'}>

    <div class="card" style="padding:13px;margin-bottom:8px;cursor:pointer" onclick="brewViewHistory('${b.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:700;font-size:14px;color:#0F1829">${h(b.name||'Без названия')}</div>
          <div style="font-size:11px;color:#8896AA;margin-top:2px">${new Date(b.startedAt).toLocaleDateString('ru')} · ${b.batch}г · ${b.tech.length} ингредиентов</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${b.deducted?`<span style="font-size:10px;background:#F0FFF4;color:#38A169;border-radius:4px;padding:2px 7px;font-weight:700">списано</span>`:
          `<span style="font-size:10px;background:#FFF8F0;color:#DD6B20;border-radius:4px;padding:2px 7px;font-weight:700">не списано</span>`}
        </div>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
        ${b.tech.slice(0,3).map(t=>`<span style="font-size:10px;color:#6B7A8D;background:#F0F4F8;border-radius:4px;padding:2px 6px">${h(t.trade)}</span>`).join('')}
        ${b.tech.length>3?`<span style="font-size:10px;color:#8896AA">+${b.tech.length-3}</span>`:''}
      </div>
    </div>`).join('')}`:''}`;
  }

  // ── Активная варка ──
  const batch=parseFloat(br.batch)||0;
  const phases=[...new Set(br.tech.map(i=>i.phase))].sort();
  const PHC2={А:'#4299E1',Б:'#48BB78',В:'#ED8936',Г:'#9F7AEA',Д:'#F56565',Е:'#38B2AC',Ж:'#ECC94B'};

  let totalPlan=0,totalFact=0,doneCount=0;
  br.tech.forEach(t=>{
    const plan=batch?(t.pct/100*batch):0;
    const fact=br.fact[t.trade]!==undefined?parseFloat(br.fact[t.trade]):null;
    totalPlan+=plan;
    if(fact!==null){totalFact+=fact;doneCount++;}
  });

  return`
  <!-- Шапка варки -->
  <div style="background:#1E3A6B;border-radius:12px;padding:14px 16px;margin-bottom:10px;color:#fff">

      </div>
    </div>
  </div>

  <!-- Ингредиенты по фазам -->
  ${phases.map(ph=>{
    const items=br.tech.filter(t=>t.phase===ph);

    return`<div class="card" style="margin-bottom:10px;overflow:hidden">
      <div style="background:${phColor}15;padding:8px 14px;border-bottom:1px solid ${phColor}25;display:flex;align-items:center;gap:8px">

        const diffPct=diff!==null&&plan?((diff/plan)*100):null;
        const diffColor=diff===null?'#8896AA':Math.abs(diff)<0.1?'#38A169':diff>0?'#DD6B20':'#E53E3E';

        const stockQty=stk?parseFloat(stk.qty)||0:null;
        const enough=stockQty!==null?stockQty>=plan:null;
        return`<div style="padding:12px 14px;${idx<items.length-1?'border-bottom:1px solid #F0F4F8':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px">

              ${item.inci?`<div style="font-size:10px;color:#8896AA;margin-top:1px">${h(item.inci)}</div>`:''}
              <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap;align-items:center">
                <span style="font-size:11px;color:#6B7A8D">${item.pct}%</span>
                ${plan?`<span style="font-size:12px;font-weight:800;color:#1E6BE6;background:#EBF5FF;border-radius:5px;padding:1px 7px">${plan.toFixed(1)} г</span>`:''}
                ${stockQty!==null?`<span style="font-size:10px;color:${enough?'#38A169':'#E53E3E'};background:${enough?'#F0FFF4':'#FFF5F5'};border-radius:4px;padding:1px 5px">склад: ${stockQty}г</span>`:''}
                ${item.supplier?`<span style="font-size:10px;color:#8896AA">${h(item.supplier)}</span>`:''}
              </div>
            </div>
            ${hasFact?`<div style="text-align:right;flex-shrink:0">
              <div style="font-size:11px;font-weight:700;color:${diffColor}">${diff!==null?(diff>0?'+':'')+diff.toFixed(1)+'г':''}</div>
              ${diffPct!==null?`<div style="font-size:10px;color:${diffColor}">${diffPct>0?'+':''}${diffPct.toFixed(0)}%</div>`:''}

function brewSetFact(trade,val){
  S.brew.fact[trade]=val;
  // Обновляем только шапку счётчиков без перерисовки всего
  const batch=parseFloat(S.brew.batch)||0;
  const doneCount=Object.values(S.brew.fact).filter(v=>v!==undefined&&v!=='').length;
  const totalFact=Object.values(S.brew.fact).reduce((s,v)=>s+(parseFloat(v)||0),0);
  // Обновляем отклонение рядом с полем
  const input=document.querySelector(`input[data-trade="${trade.replace(/"/g,'&quot;')}"]`);
  if(input){
    const plan=S.brew.tech.find(t=>t.trade===trade);
    const planG=plan&&batch?(plan.pct/100*batch):0;
    const factNum=parseFloat(val)||0;
    const hasFact=val!=='';
    input.style.background=hasFact?'#F0FFF4':'#F8FAFF';
    input.style.borderColor=hasFact?'#9AE6B4':'#E0E8F4';
    // Обновляем diff справа
    const diffEl=input.closest('div[style*="flex-start"]')?.querySelector('div[style*="text-align:right"]');
    if(diffEl&&planG&&hasFact){
      const diff=factNum-planG;
      const pct=planG?(diff/planG*100):0;
      const col=Math.abs(diff)<0.1?'#38A169':diff>0?'#DD6B20':'#E53E3E';
      diffEl.innerHTML=`<div style="font-size:11px;font-weight:700;color:${col}">${diff>0?'+':''}${diff.toFixed(1)}г</div><div style="font-size:10px;color:${col}">${pct>0?'+':''}${pct.toFixed(0)}%</div>`;
    }
  }
}
function brewSetExact(trade,planVal){
  const input=document.querySelector(`input[data-trade="${trade.replace(/"/g,'&quot;')}"]`);
  if(input){input.value=planVal;brewSetFact(trade,String(planVal));}
}
function brewNextField(currentInput){
  const inputs=[...document.querySelectorAll('input[data-trade]')];
  const idx=inputs.indexOf(currentInput);
  if(idx>=0&&idx<inputs.length-1)inputs[idx+1].focus();
}
function brewStart(){
  const name=(document.getElementById('brew-name')||{}).value?.trim()||'';
  const batch=parseFloat((document.getElementById('brew-batch')||{}).value)||0;
  if(!S.brew.tech.length){alert('Загрузите тех карту');return;}
  // Берём инструкции: из brew (если загружены в Варке), или из S._techInstructions (загружены в Сборке)
  const instr=S.brew.instructions?.length?S.brew.instructions:(S._techInstructions||[]);
  const sp=S.brew.specs?.length?S.brew.specs:(S._techSpecs||[]);
  S.brew={...S.brew,active:true,name,batch,fact:{},instructions:instr,specs:sp,startedAt:Date.now()};
  sT('brew');
}
function brewUsePick(){
  S.brew.tech=[...S.tech];
  S.brew.instructions=S._techInstructions||window._lastTechInstructions||[];
  S.brew.specs=S._techSpecs||window._lastTechSpecs||[];
  sT('brew');
}
function brewLoadTech(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    if(!window.XLSX){alert('Подождите, загружается...');return;}
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const items=pTR(rows);
    if(!items.length){alert('Не удалось распознать тех карту');return;}
    S.brew.tech=items;
    S.brew.instructions=window._lastTechInstructions||[];
    S.brew.specs=window._lastTechSpecs||[];
    sT('brew');
  };
  r.readAsArrayBuffer(f);
  input.value='';
}
function brewFinish(deduct){
  // Шаг 1: строим список совпадений и не найденных
  const batch=parseFloat(S.brew.batch)||0;
  const matched=[];
  const notFound=[];
  S.brew.tech.forEach(item=>{
    const factVal=S.brew.fact[item.trade];
    const used=factVal!==undefined?parseFloat(factVal):(batch?(item.pct/100*batch):0);
    const plan=batch?(item.pct/100*batch):0;
    const stk=S.stock.find(x=>fz(x.tradeName,item.trade)||fz(item.trade,x.tradeName));
    if(stk){
      matched.push({item,stk,used,plan,factVal});
    } else {
      notFound.push({item,used,plan,factVal});
    }
  });

  // Шаг 2: показываем модалку подтверждения
  const mb=document.getElementById('mb2');if(!mb)return;
  mb.innerHTML=`
    <div class="mt">${deduct?'Списание с остатков':'Завершение варки'}</div>
    <div style="font-size:12px;color:#6B7A8D;margin-bottom:12px">${S.brew.name||'Варка'} · ${batch}г</div>

    ${matched.length?`
    <div style="font-size:10px;font-weight:700;color:#276749;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
      ✓ Найдено в остатках 1С (${matched.length})
    </div>
    <div style="max-height:38vh;overflow-y:auto;margin-bottom:12px;border:1px solid #E8ECF2;border-radius:8px">
      ${matched.map(({item,stk,used,plan})=>{
        const cur=parseFloat(stk.qty)||0;
        const after=Math.max(0,cur-used);
        const diff=used-plan;
        const diffCol=Math.abs(diff)<0.1?'#38A169':diff>0?'#DD6B20':'#E53E3E';
        return`<div style="padding:8px 12px;border-bottom:1px solid #F0F4F8;display:grid;grid-template-columns:1fr auto;gap:4px;align-items:center">
          <div>
            <div style="font-size:12px;font-weight:600;color:#0F1829">${h(item.trade)}</div>
            ${stk.tradeName!==item.trade?`<div style="font-size:10px;color:#8896AA">→ ${h(stk.tradeName)}</div>`:''}
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;font-weight:700;color:#1E6BE6">${used.toFixed(1)}г</div>
            <div style="font-size:10px;color:#8896AA">${cur}→<span style="color:${after<50?'#E53E3E':'#38A169'}">${after.toFixed(0)}</span>г</div>
            ${Math.abs(diff)>0.1?`<div style="font-size:10px;color:${diffCol}">${diff>0?'+':''}${diff.toFixed(1)}г от плана</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    ${notFound.length?`
    <div style="font-size:10px;font-weight:700;color:#C53030;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
      ✗ Не найдено в 1С (${notFound.length}) — не будет списано
    </div>
    <div style="max-height:20vh;overflow-y:auto;margin-bottom:12px;border:1px solid #FEB2B2;border-radius:8px;background:#FFF5F5">
      ${notFound.map(({item,used})=>`
      <div style="padding:7px 12px;border-bottom:1px solid #FED7D7;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:#C53030;font-weight:600">${h(item.trade)}</div>
        <div style="font-size:11px;color:#E53E3E">${used.toFixed(1)}г</div>
      </div>`).join('')}
    </div>
    <div style="font-size:11px;color:#8896AA;margin-bottom:10px">
      💡 Привяжите эти позиции к 1С через вкладку «1С → Редактировать → Связь с 1С»
    </div>`:''}

    <div style="display:flex;flex-direction:column;gap:8px">
      ${deduct?`<button onclick="brewDoFinish(true)" style="background:#1E6BE6;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">
        Подтвердить списание ${matched.length} позиций
      </button>`:''}
      <button onclick="brewDoFinish(false)" style="background:#F0FFF4;border:1.5px solid #9AE6B4;color:#276749;border-radius:9px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">
        ${deduct?'Завершить без списания':'Завершить'}
      </button>
      <button onclick="cM()" style="background:#fff;border:1.5px solid #E8ECF2;color:#8896AA;border-radius:8px;padding:10px;font-size:13px;cursor:pointer">Отмена</button>
    </div>`;
  oM();
}
function brewDoFinish(deduct){
  const batch=parseFloat(S.brew.batch)||0;
  if(deduct){
    S.brew.tech.forEach(item=>{
      const factVal=S.brew.fact[item.trade];
      const used=factVal!==undefined?parseFloat(factVal):(batch?(item.pct/100*batch):0);
      if(!used)return;
      const stk=S.stock.find(x=>fz(x.tradeName,item.trade)||fz(item.trade,x.tradeName));
      if(stk){
        const newQty=Math.max(0,(parseFloat(stk.qty)||0)-used);
        const si=S.stock.indexOf(stk);
        S.stock[si]={...stk,qty:newQty};
        svm(stk.tradeName,{qty:newQty});
      }
    });
  }
  const record={
    id:'brew_'+Date.now(),name:S.brew.name,batch,
    tech:S.brew.tech,fact:S.brew.fact,
    instructions:S.brew.instructions||[],specs:S.brew.specs||[],
    startedAt:S.brew.startedAt,finishedAt:Date.now(),deducted:deduct
  };
  if(!S.brewHistory)S.brewHistory=[];
  S.brewHistory.push(record);
  sv();
  S.brew={active:false,name:'',batch:0,tech:[],fact:{},instructions:[],specs:[],startedAt:null};
  cM();sT('brew');
}
function brewCancel(){
  if(!confirm('Отменить варку? Данные не сохранятся.'))return;
  S.brew={active:false,name:'',batch:0,tech:S.brew.tech,fact:{},startedAt:null};
  sT('brew');
}
function brewExport(){
  const br=S.brew;
  const batch=parseFloat(br.batch)||0;
  let csv='Фаза;Ингредиент;INCI;%%;План (г);Факт (г);Отклонение (г);Отклонение (%)\n';
  csv+=br.tech.map(t=>{
    const plan=batch?(t.pct/100*batch):0;
    const fact=br.fact[t.trade]!==undefined?parseFloat(br.fact[t.trade]):'';
    const diff=fact!==''&&plan?(fact-plan).toFixed(1):'';
    const diffPct=fact!==''&&plan?(((fact-plan)/plan)*100).toFixed(1):'';
    return[t.phase,'"'+t.trade.replace(/"/g,'""')+'"','"'+(t.inci||'').replace(/"/g,'""')+'"',t.pct,plan.toFixed(1),fact,diff,diffPct].join(';');
  }).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Варка_'+(br.name||'export')+'_'+new Date().toLocaleDateString('ru').replace(/\./g,'-')+'.csv';
  a.click();
}

    ${!b.deducted?`<button onclick="brewDeductHistory('${b.id}')" style="width:100%;margin-top:12px;background:#1E6BE6;color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">Списать с остатков сейчас</button>`:''}
    <button class="abtn-s" style="width:100%;margin-top:8px;padding:10px" onclick="cM()">Закрыть</button>`;
  oM();

function brewDeductHistory(id){
  const b=(S.brewHistory||[]).find(x=>x.id===id);
  if(!b||b.deducted)return;
  if(!confirm('Списать факт этой варки с остатков?'))return;
  const batch=parseFloat(b.batch)||0;
  b.tech.forEach(item=>{
    const factVal=b.fact[item.trade];
    const used=factVal!==undefined?parseFloat(factVal):batch?(item.pct/100*batch):0;
    if(!used)return;
    const stk=S.stock.find(x=>fz(x.tradeName,item.trade)||fz(item.trade,x.tradeName));
    if(stk){
      const newQty=Math.max(0,(parseFloat(stk.qty)||0)-used);
      const si=S.stock.indexOf(stk);
      S.stock[si]={...stk,qty:newQty};
      svm(stk.tradeName,{qty:newQty});
    }
  });
  b.deducted=true;
  sv();cM();
}

function resetData(what){
  const labels={stock:'остатки 1С',tech:'тех карту',warehouse:'склад',meta:'карточки ингредиентов',all:'ВСЕ данные'};
  if(!confirm('Сбросить '+labels[what]+'? Отменить нельзя.'))return;
  if(what==='stock'||what==='all'){S.stock=[];localStorage.removeItem('gc_stock');}
  if(what==='tech'||what==='all'){S.tech=[];S.sheets=[];S.checked={};S.bm='';S.pn2='';S.as=0;localStorage.removeItem('gc_tech');localStorage.removeItem('gc_sheets');}
  if(what==='warehouse'||what==='all'){S.rooms=[];S.racks=[];S.shelves=[];S.spots=[];['rooms','racks','shelves','spots'].forEach(k=>localStorage.removeItem('gc_'+k));}
  if(what==='meta'||what==='all'){S.meta=[];localStorage.removeItem('gc_meta');}
  if(what==='all'){S.inv={active:false,items:{},startedAt:null};S.brew={active:false,name:'',batch:0,tech:[],fact:{},startedAt:null};S.brewHistory=[];S.checked={};}
  sv();cM();rT();
}

function invNameSearch(q){
  const res=document.getElementById('inv-name-results');
  const msg=document.getElementById('inv-scan-msg');
  if(!res)return;
  if(!q||q.length<1){res.style.display='none';return;}
  const allIngs=[...S.meta,...S.stock.filter(s=>!S.meta.find(m=>m.tradeName.toLowerCase()===s.tradeName.toLowerCase()))];
  const matches=allIngs.filter(x=>fz(q,x.tradeName)||(x.inci&&fz(q,x.inci))).slice(0,20);
  if(!matches.length){res.innerHTML='<div style="padding:10px 14px;font-size:12px;color:#8896AA">Не найдено</div>';res.style.display='block';return;}

function exportInv(mode){
  // CSV экспорт — не нужен XLSX
  if(mode==='csv-report'||mode==='csv-1c'){
    const allIngs=S.meta;
    const rows=allIngs.map(ing=>{
      const fact=S.inv.items[ing.tradeName];
      const plan=parseFloat(ing.qty)||0;
      const counted=fact!==undefined;
      const diff=counted?(parseFloat(fact)||0)-plan:null;
      const path=ing.spotId?gsp(ing.spotId):'';
      return{ing,fact:fact!==undefined?parseFloat(fact)||0:null,plan,counted,diff,path};
    });
    const date=new Date().toLocaleDateString('ru');
    let csv='',filename='';
    if(mode==='csv-report'){
      csv='Позиция;INCI;Расположение;В системе (г);Факт (г);Расхождение (г);Статус\n';
      csv+=rows.map(r=>[
        '"'+r.ing.tradeName.replace(/"/g,'""')+'"',
        '"'+(r.ing.inci||'').replace(/"/g,'""')+'"',
        '"'+r.path.replace(/"/g,'""')+'"',
        r.plan,
        r.fact!==null?r.fact:'не проверено',
        r.diff!==null?r.diff:'',
        r.diff===null?'Не проверено':r.diff===0?'Совпадает':r.diff>0?'Излишек':'Недостача'
      ].join(';')).join('\n');
      filename='Инвентаризация_'+date.replace(/\./g,'-')+'.csv';
    } else {
      // csv-1c: только проверенные, формат для 1С
      const counted1c=rows.filter(r=>r.counted);
      if(!counted1c.length){alert('Нет проверенных позиций');return;}
      csv='Номенклатура;Количество;Единица измерения;Склад / Место\n';
      csv+=counted1c.map(r=>[
        '"'+r.ing.tradeName.replace(/"/g,'""')+'"',
        r.fact,
        'г',
        '"'+(r.path||'Основной склад').replace(/"/g,'""')+'"'
      ].join(';')).join('\n');
      filename='Остатки_для_1С_'+date.replace(/\./g,'-')+'.csv';
    }
    // BOM для корректного открытия в Excel
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
    return;
  }

  if(!window.XLSX){alert('Загружается, повторите через секунду');return;}
  const allIngs=S.meta;
  const rows=allIngs.map(ing=>{
    const fact=S.inv.items[ing.tradeName];
    const plan=parseFloat(ing.qty)||0;
    const counted=fact!==undefined;
    const diff=counted?(parseFloat(fact)||0)-plan:null;
    const path=ing.spotId?gsp(ing.spotId):'';
    return{ing,fact:fact!==undefined?parseFloat(fact)||0:null,plan,counted,diff,path};
  });

  const date=new Date().toLocaleDateString('ru');
  const wb=window.XLSX.utils.book_new();

  if(mode==='report'){
    // ── Отчёт инвентаризации ──────────────────────────────────────
    const header=[['Инвентаризация ГдеЧто — '+date],[],
      ['Позиция','INCI','Расположение','Тип','В системе (г)','Факт (г)','Расхождение (г)','Статус']];
    const dataRows=rows.map(r=>[
      r.ing.tradeName,
      r.ing.inci||'',
      r.path,
      r.ing.type||'',
      r.plan,
      r.fact!==null?r.fact:'не проверено',
      r.diff!==null?r.diff:'',
      r.diff===null?'Не проверено':r.diff===0?'Совпадает':r.diff>0?'Излишек':'Недостача'
    ]);
    const ws=window.XLSX.utils.aoa_to_sheet([...header,...dataRows]);
    // Column widths
    ws['!cols']=[{wch:35},{wch:30},{wch:30},{wch:12},{wch:14},{wch:10},{wch:16},{wch:14}];
    // Freeze header rows
    ws['!freeze']={xSplit:0,ySplit:3};
    window.XLSX.utils.book_append_sheet(wb,ws,'Инвентаризация');

    // Sheet 2: only discrepancies
    const diffRows=rows.filter(r=>r.counted&&r.diff!==0);
    if(diffRows.length){
      const ws2=window.XLSX.utils.aoa_to_sheet([
        [['Расхождения — '+date]],[],
        ['Позиция','Расположение','Было (г)','Стало (г)','Разница (г)'],
        ...diffRows.map(r=>[r.ing.tradeName,r.path,r.plan,r.fact,r.diff])
      ]);
      ws2['!cols']=[{wch:35},{wch:30},{wch:12},{wch:10},{wch:12}];
      window.XLSX.utils.book_append_sheet(wb,ws2,'Расхождения');
    }
    window.XLSX.writeFile(wb,'Инвентаризация_'+date.replace(/\./g,'-')+'.xlsx');

  } else {
    // ── Формат для загрузки в 1С ─────────────────────────────────
    // Стандартный формат: Номенклатура | Количество | Ед.изм. | Склад
    const header1c=[
      ['// Загрузка остатков в 1С — ГдеЧто — '+date],
      ['// Используйте обработку "Загрузка данных из табличного документа" в 1С'],
      [],
      ['Номенклатура','Количество','Единица измерения','Склад / Место','Комментарий']
    ];
    const counted1c=rows.filter(r=>r.counted);
    const dataRows1c=counted1c.map(r=>[
      r.ing.tradeName,
      r.fact,
      'г',
      r.path||'Основной склад',
      r.diff===0?'Совпадает':r.diff>0?'Излишек +'+r.diff+'г':'Недостача '+r.diff+'г'
    ]);

    if(!dataRows1c.length){
      alert('Нет проверенных позиций для выгрузки');return;
    }

    const ws=window.XLSX.utils.aoa_to_sheet([...header1c,...dataRows1c]);
    ws['!cols']=[{wch:40},{wch:14},{wch:16},{wch:35},{wch:20}];
    window.XLSX.utils.book_append_sheet(wb,ws,'Остатки для 1С');

    // Инструкция на втором листе
    const ws2=window.XLSX.utils.aoa_to_sheet([
      [['Как загрузить в 1С']],[],
      ['1. Откройте 1С → меню Склад → Инвентаризация товаров'],
      ['2. Или используйте обработку: Файл → Открыть → Загрузка данных из табличного документа'],
      ['3. Укажите лист "Остатки для 1С" и настройте соответствие колонок:'],
      ['   Колонка A → Номенклатура'],
      ['   Колонка B → Количество'],
      ['   Колонка C → Единица измерения'],
      ['4. Нажмите Загрузить'],
      [],[],
      ['Дата инвентаризации: '+date],
      ['Всего проверено: '+counted1c.length+' позиций'],
      ['Расхождений: '+rows.filter(r=>r.counted&&r.diff!==0).length],
    ]);
    ws2['!cols']=[{wch:60}];
    window.XLSX.utils.book_append_sheet(wb,ws2,'Инструкция');

    window.XLSX.writeFile(wb,'Остатки_для_1С_'+date.replace(/\./g,'-')+'.xlsx');
  }
}

function finishInv(){
  stopInvCamera();
  let updated=0;
  Object.entries(S.inv.items).forEach(([name,qty])=>{
    const fact=parseFloat(qty)||0;
    // Обновляем meta (создаём запись если нет)
    svm(name,{qty:fact});
    // Обновляем stock тоже
    const si=S.stock.findIndex(x=>x.tradeName===name);
    if(si>=0)S.stock[si]={...S.stock[si],qty:fact};
    updated++;
  });
  sv();
  const total=Object.keys(S.inv.items).length;
  const withDiff=Object.entries(S.inv.items).filter(([name,qty])=>{
    const base=S.meta.find(x=>x.tradeName===name)||S.stock.find(x=>x.tradeName===name);
    return base&&(parseFloat(qty)||0)!==(parseFloat(base.qty)||0);
  }).length;
  S.inv={active:false,items:{},startedAt:null};
  // Show toast
  const el=document.getElementById('ab2');
  if(el){
    el.innerHTML=`<div style="background:#F0FFF4;border:1.5px solid #9AE6B4;border-radius:12px;padding:20px;text-align:center;margin-bottom:12px">
      <div style="font-size:18px;font-weight:800;color:#38A169;margin-bottom:4px">Инвентаризация завершена</div>
      <div style="font-size:13px;color:#6B7A8D">Обновлено позиций: ${updated}<br>С расхождениями: ${withDiff}</div>

function invScanManual(){
  const inp=document.getElementById('inv-bc');
  const bc=(inp?.value||'').trim();if(!bc)return;
  invProcessBC(bc);if(inp)inp.value='';
}
function invProcessBC(bc){
  const ing=S.meta.find(x=>x.barcode===bc)||S.stock.find(x=>x.barcode===bc);
  if(!ing){
    const msg=document.getElementById('inv-scan-msg');
    if(msg){msg.textContent='Штрих-код не найден. Введите количество вручную.';msg.style.color='#E53E3E';}
    return;
  }
  invSelectItem(ing.tradeName);
}
function invSelectItem(name){
  const metaIng=S.meta.find(x=>x.tradeName===name);
  const stockIng=S.stock.find(x=>x.tradeName===name);
  const ing=metaIng||(stockIng?{...stockIng}:null);
  if(!ing)return;
  const path=ing.spotId?gsp(ing.spotId):'';
  const currentFact=S.inv.items[name]!==undefined?S.inv.items[name]:(ing.qty||0);
  const el=document.getElementById('inv-current');
  if(!el)return;
  el.innerHTML=`<div class="card" data-invname="${h(name)}" style="padding:16px;margin-bottom:12px;border:1.5px solid #1E6BE6">
    <div style="font-weight:700;font-size:15px;color:#0F1829;margin-bottom:4px">${h(name)}</div>
    ${path?`<div style="font-size:12px;color:#1E6BE6;margin-bottom:8px">📍 ${h(path)}</div>`:''}
    <div style="display:flex;gap:12px;margin-bottom:14px">
      <div style="flex:1;background:#F8FAFF;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:#8896AA;margin-bottom:2px">В системе</div>
        <div style="font-size:18px;font-weight:800;color:#6B7A8D">${ing.qty||0}г</div>
      </div>
      <div style="flex:1;background:#EBF5FF;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:#8896AA;margin-bottom:2px">Фактически</div>
        <input id="inv-fact-inp" type="number" inputmode="numeric" value="${currentFact}"
          style="width:100%;border:none;background:none;text-align:center;font-size:18px;font-weight:800;color:#1E6BE6;outline:none;font-family:inherit"
          onkeydown="if(event.key==='Enter')saveInvFact(this.closest('[data-invname]').dataset.invname)">
        <div style="font-size:10px;color:#8896AA">г</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="saveInvFact(this.closest('[data-invname]').dataset.invname)" style="flex:1;background:#1E6BE6;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">Сохранить</button>
      <button onclick="document.getElementById('inv-current').innerHTML=''" style="background:#fff;border:1.5px solid #E8ECF2;color:#8896AA;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer">✕</button>
    </div>
  </div>`;
  // Focus input
  setTimeout(()=>{const inp=document.getElementById('inv-fact-inp');if(inp){inp.focus();inp.select();}},100);
}
function saveInvFact(name){
  const inp=document.getElementById('inv-fact-inp');
  const val=(inp?.value||'').trim();
  if(val==='')return;
  S.inv.items[name]=parseFloat(val)||0;
  // Clear current and re-render lists
  const cur=document.getElementById('inv-current');if(cur)cur.innerHTML='';
  const msg=document.getElementById('inv-scan-msg');
  if(msg){msg.textContent='✓ Сохранено: '+h(name)+' — '+val+'г';msg.style.color='#38A169';}
  // Re-render inv tab to update counts
  sT('inv');
}

// Inv camera
let _istr=null,_itmr=null;
function startInvCamera(){
  const v=document.getElementById('lv');if(!v)return;
  const wrap=document.getElementById('inv-cam-wrap');
  const btn=document.getElementById('inv-cam-btn');
  if(!wrap)return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}}).then(stream=>{
    _istr=stream;v.srcObject=stream;v.play();
    wrap.appendChild(v);wrap.style.display='block';
    v.style.cssText='width:100%;height:180px;object-fit:cover;display:block;';
    if(btn)btn.textContent='Остановить камеру';
    btn.onclick=stopInvCamera;
    // Dedicated canvas for inv scanner
    let iCv=document.getElementById('inv-scan-cv');
    if(!iCv){iCv=document.createElement('canvas');iCv.id='inv-scan-cv';iCv.style.display='none';document.body.appendChild(iCv);}
    _itmr=setInterval(()=>{
      if(v.readyState<2)return;
      function tryD(scale){iCv.width=Math.round(v.videoWidth*scale);iCv.height=Math.round(v.videoHeight*scale);iCv.getContext('2d').drawImage(v,0,0,iCv.width,iCv.height);const id=iCv.getContext('2d').getImageData(0,0,iCv.width,iCv.height);if(window.jsQR){const r=window.jsQR(id.data,id.width,id.height,{inversionAttempts:'attemptBoth'});if(r)return r.data;}if(window.ZXing){try{const hints=new Map();hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.UPC_E,ZXing.BarcodeFormat.QR_CODE]);hints.set(ZXing.DecodeHintType.TRY_HARDER,true);const rd=new ZXing.MultiFormatReader();rd.setHints(hints);const ls=new ZXing.HTMLCanvasElementLuminanceSource(iCv);const res=rd.decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(ls)));if(res)return res.getText();}catch(e){}}return null;}
      const r=tryD(1)||tryD(0.5)||tryD(2);if(r){stopInvCamera();invProcessBC(r);return;}
    },300);
  }).catch(e=>{const msg=document.getElementById('inv-scan-msg');if(msg){msg.textContent='Камера недоступна';msg.style.color='#E53E3E';}});
}
function stopInvCamera(){
  clearInterval(_itmr);
  if(_istr){_istr.getTracks().forEach(t=>t.stop());_istr=null;}
  const v=document.getElementById('lv');
  if(v){v.style.display='none';v.srcObject=null;document.body.appendChild(v);}
  const wrap=document.getElementById('inv-cam-wrap');if(wrap)wrap.style.display='none';
  const btn=document.getElementById('inv-cam-btn');
  if(btn){btn.textContent='Включить камеру';btn.onclick=startInvCamera;}
}
