<div><div class="ms"><div><div style="color:#fff;font-size:9px;font-weight:700">Сканер</div><div style="color:rgba(255,255,255,.7);font-size:8px;margin-top:2px">Наведите на штрих-код</div></div><div class="msb">Нужен</div></div>

<section class="cta"><h2>Начните прямо сейчас</h2><p>Бесплатно. Без установки. Работает на любом телефоне через браузер.</p><div class="ctaf"><input class="ctai" id="he" type="email" placeholder="Ваш email"/><button class="ctab" onclick="hR()">Зарегистрироваться</button></div><div class="ctan" id="cn">Нажимая кнопку, вы соглашаетесь с условиями использования</div></section>
<footer><div class="fl">Где<span>Что</span></div><p style="font-size:11px;color:#8896AA">Мобильный сервис для малого производства · 2026</p></footer>`;

const LOH=`<div class="aw"><div class="ab"><div class="alo"><div class="ai">ГЧ</div><div class="aln">Где<span>Что</span></div></div><div class="atit">Вход в сервис</div><div class="asub">Введите email и пароль</div><div class="dhint">Демо-доступ: логин <strong>gde</strong>, пароль <strong>chto</strong></div><div class="fg"><label class="lbl">Email или логин</label><input class="inp" id="le" type="text" placeholder="gde или email@company.ru" autocomplete="username"/><div class="err" id="lerr">Неверный логин или пароль</div></div><div class="fg"><label class="lbl">Пароль</label><input class="inp" id="lp" type="password" placeholder="Введите пароль" autocomplete="current-password" onkeydown="if(event.key==='Enter')dLo()"/></div><button class="btn-blue" onclick="dLo()" style="margin-top:8px">Войти</button><div class="adiv">или</div><button class="btn-ghost" onclick="dL()" style="width:100%">Войти как демо-пользователь</button><div class="alink">Нет аккаунта? <a onclick="sp('r')">Зарегистрироваться бесплатно</a></div><div class="alink" style="margin-top:6px"><a onclick="sp('l')">На главную</a></div></div></div>`;

const REH=`<div class="aw"><div class="ab"><div class="alo"><div class="ai">ГЧ</div><div class="aln">Где<span>Что</span></div></div><div class="atit">Создать аккаунт</div><div class="asub">14 дней бесплатно — без карты</div><div class="fg"><label class="lbl">Имя</label><input class="inp" id="rn" type="text" placeholder="Иван Иванов"/></div><div class="fg"><label class="lbl">Email</label><input class="inp" id="re" type="email" placeholder="email@company.ru"/><div class="err" id="rerr">Введите корректный email</div></div><div class="fg"><label class="lbl">Пароль</label><input class="inp" id="rp" type="password" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')dRe()"/><div class="err" id="rperr">Минимум 6 символов</div></div><div style="margin-bottom:8px"><label style="display:flex;align-items:flex-start;gap:7px;cursor:pointer;font-size:12px;color:#6B7A8D"><input type="checkbox" id="ra" style="margin-top:2px;flex-shrink:0"/><span>Согласен с условиями использования</span></label><div class="err" id="raerr">Необходимо согласие</div></div><button class="btn-blue" onclick="dRe()" style="margin-top:10px">Создать аккаунт</button><div class="alink">Уже есть аккаунт? <a onclick="sp('lo')">Войти</a></div><div class="alink" style="margin-top:6px"><a onclick="sp('l')">На главную</a></div></div></div>`;

const VEH=`<div class="aw"><div class="ab" style="text-align:center"><div class="alo"><div class="ai">ГЧ</div></div><div class="vi">&#9993;</div><div class="atit">Подтвердите email</div><div class="asub" id="vs">Отправили код на <strong id="vel"></strong></div><div class="cr"><input class="ci" maxlength="1" type="text" inputmode="numeric" oninput="ci(this,0)" onkeydown="ck(this,event,0)"/><input class="ci" maxlength="1" type="text" inputmode="numeric" oninput="ci(this,1)" onkeydown="ck(this,event,1)"/><input class="ci" maxlength="1" type="text" inputmode="numeric" oninput="ci(this,2)" onkeydown="ck(this,event,2)"/><input class="ci" maxlength="1" type="text" inputmode="numeric" oninput="ci(this,3)" onkeydown="ck(this,event,3)"/></div><div class="err" id="cerr" style="text-align:center;margin-bottom:8px;display:none">Неверный код</div><div style="font-size:12px;color:#38A169;text-align:center;margin-bottom:8px;display:none" id="cok">Код подтверждён!</div><button class="btn-blue" onclick="vC()">Подтвердить</button><div class="alink" style="margin-top:12px">Не получили? <a onclick="rC()">Отправить повторно</a></div><div style="font-size:10px;color:#C0C8D8;margin-top:8px">Для демо введите: <strong>1234</strong></div></div></div>`;

const S={u:null,pe:null,pn:null,rooms:[],racks:[],shelves:[],spots:[],meta:[],stock:[],tech:[],sheets:[],as:0,pn2:'',bm:'',sm:'find',ss:null,lb:null,lt:null,sid:null,am:'search',as2:'',mf:{},ein:null,eif:{},modal:null,mf2:{},eid:null,mpid:null,dm:'',df:null,tab:'warehouse',hi:null};

function sv(){try{['rooms','racks','shelves','spots','meta'].forEach(k=>localStorage.setItem('gc_'+k,JSON.stringify(S[k])));}catch(e){}}

function svm(name,patch){const i=S.meta.findIndex(x=>x.tradeName.toLowerCase()===name.toLowerCase());if(i>=0)S.meta[i]={...S.meta[i],...patch};else S.meta.push({tradeName:name,...patch});S.stock=S.stock.map(x=>x.tradeName.toLowerCase()===name.toLowerCase()?{...x,...patch}:x);sv();}
function ms(raw){return raw.map(item=>{const m=S.meta.find(x=>x.tradeName.toLowerCase()===item.tradeName.toLowerCase());return{...item,spotId:m?.spotId||'',barcode:m?.barcode||'',inci:m?.inci||'',expiry:m?.expiry||item.expiry};});}
function gis(sid){return S.meta.filter(m=>m.spotId===sid).map(m=>{const s=S.stock.find(x=>x.tradeName.toLowerCase()===m.tradeName.toLowerCase());return s?{...s,...m}:{...m,qty:m.qty||0};});}
function gsp(sid){const sp=S.spots.find(s=>s.id===sid);if(!sp)return'';const sh=S.shelves.find(s=>s.id===sp.shelfId);const ra=sh?S.racks.find(r=>r.id===sh.rackId):null;const ro=ra?S.rooms.find(r=>r.id===ra.roomId):null;return[ro?.name,ra?.name,sh?.name,sp?.name].filter(Boolean).join(' › ');}
function fib(bc){const m=S.meta.find(x=>x.barcode===bc);if(!m)return null;const s=S.stock.find(x=>x.tradeName.toLowerCase()===m.tradeName.toLowerCase());return s?{...s,...m}:{...m,qty:m.qty||0};}
function cri(rid){const rids=S.racks.filter(r=>r.roomId===rid).map(r=>r.id);const sids=S.shelves.filter(s=>rids.includes(s.rackId)).map(s=>s.id);const pids=S.spots.filter(s=>sids.includes(s.shelfId)).map(s=>s.id);return S.meta.filter(m=>pids.includes(m.spotId)).length;}
function cra(rid){const sids=S.shelves.filter(s=>s.rackId===rid).map(s=>s.id);const pids=S.spots.filter(s=>sids.includes(s.shelfId)).map(s=>s.id);return S.meta.filter(m=>pids.includes(m.spotId)).length;}
function eb(d){if(!d)return'';const days=Math.floor((new Date(d)-Date.now())/86400000);if(days<0)return'<span class="tag tr2">Просрок</span>';if(days<30)return`<span class="tag to">${days}д</span>`;return`<span class="tag tgr">${d.slice(0,7)}</span>`;}
function tp(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

}
function dLo(){const e=(document.getElementById('le')||{}).value?.trim()||'';const p=(document.getElementById('lp')||{}).value?.trim()||'';const err=document.getElementById('lerr');if((e==='gde'||e==='demo@gdechto.app')&&p==='chto'){if(err)err.style.display='none';S.u={name:'Демо',email:'demo@gdechto.app'};sp('a');return;}const users=JSON.parse(localStorage.getItem('gc_users')||'[]');const user=users.find(u=>u.email===e&&u.pass===p);if(user){if(err)err.style.display='none';S.u=user;sp('a');return;}if(err)err.style.display='block';}

function dL(){S.u={name:'Демо',email:'demo@gdechto.app'};sp('a');}
function hR(){const e=(document.getElementById('he')||{}).value?.trim()||'';if(!e||!e.includes('@')){const el=document.getElementById('he');if(el)el.style.borderColor='#E53E3E';return;}S.pe=e;S.pn=e.split('@')[0];sp('v');const el=document.getElementById('vel');if(el)el.textContent=e;document.querySelectorAll('.ci').forEach(x=>x.value='');}
function vC(){const code=Array.from(document.querySelectorAll('.ci')).map(x=>x.value).join('');const e=document.getElementById('cerr'),ok=document.getElementById('cok');if(code==='1234'||code.length===4){if(e)e.style.display='none';if(ok)ok.style.display='block';S.u={name:S.pn||'Пользователь',email:S.pe||''};setTimeout(()=>sp('a'),600);}else{if(e)e.style.display='block';if(ok)ok.style.display='none';}}
function rC(){document.querySelectorAll('.ci').forEach(x=>x.value='');const el=document.getElementById('vs');if(el)el.innerHTML='Код отправлен повторно на <strong>'+h(S.pe||'')+'</strong>';document.querySelectorAll('.ci')[0]?.focus();}
function ci(el,i){el.value=el.value.replace(/\D/g,'').slice(-1);if(el.value&&i<3)document.querySelectorAll('.ci')[i+1].focus();if(i===3&&el.value)vC();}
function ck(el,e,i){if(e.key==='Backspace'&&!el.value&&i>0)document.querySelectorAll('.ci')[i-1].focus();}
function rAS(){const u=S.u||{};return`<div class="an"><div class="alo2" onclick="sp('l')">Где<span>Что</span></div><div class="au"><span style="font-size:11px;color:#8896AA">${h(u.name||'')}</span><div class="ava">${(u.name||'U')[0].toUpperCase()}</div><button class="aex" onclick="sp('l')">Выйти</button></div></div><div class="ats" id="ats"><div class="at a" onclick="sT('warehouse')">Склад</div><div class="at" onclick="sT('stock')">Остатки 1С</div><div class="at" onclick="sT('pick')">Сборка</div><div class="at" onclick="sT('scan')">Сканер</div></div><div class="ab2" id="ab2"></div>`;}
function sT(tab){S.tab=tab;if(tab!=='scan')stSc();document.querySelectorAll('.at').forEach((el,i)=>el.classList.toggle('a',['warehouse','stock','pick','scan'][i]===tab));rT();}
